<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Management – Malo Cafe</title>
  <meta name="description" content="Malo Cafe admin dashboard for managing customer reviews.">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Review cards grid ── */
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
      margin-top: 0.5rem;
    }

    .review-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: box-shadow 0.2s;
    }
    .review-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

    /* Top row: avatar + name + badge + stars */
    .review-card-header {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .review-avatar {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8125rem;
      flex-shrink: 0;
      color: #fff;
    }

    .review-meta { flex: 1; min-width: 0; }
    .review-meta strong { display: block; font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .review-meta time   { font-size: 0.75rem; color: var(--muted-foreground); }

    .review-stars { margin-left: auto; font-size: 0.875rem; letter-spacing: 0.05em; color: #f4a822; white-space: nowrap; }
    .review-stars .empty { color: #ccc; }

    /* Review body text */
    .review-body {
      font-size: 0.8125rem;
      color: var(--foreground);
      line-height: 1.6;
      flex: 1;
    }

    /* Photo thumbnail */
    .review-photo {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      cursor: zoom-in;
      transition: opacity 0.2s;
    }
    .review-photo:hover { opacity: 0.9; }

    /* Action buttons row */
    .review-actions {
      display: flex;
      gap: 0.5rem;
      padding-top: 0.25rem;
      border-top: 1px solid var(--border);
    }
    .review-actions .action-btn { flex: 1; justify-content: center; }
    .action-btn.approve-btn  { color: hsl(85,30%,40%); border-color: hsl(85,25%,72%); }
    .action-btn.approve-btn:hover { background: hsla(85,25%,72%,0.2); }
    .action-btn.delete-btn   { color: hsl(0,60%,45%); border-color: hsla(0,84%,60%,0.25); }
    .action-btn.delete-btn:hover  { background: hsla(0,84%,60%,0.08); }
    .action-btn.unapprove-btn { color: hsl(38,55%,40%); border-color: hsla(38,60%,55%,0.4); }
    .action-btn.unapprove-btn:hover { background: hsla(38,60%,55%,0.1); }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-tab {
      padding: 0.3125rem 0.875rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--background);
      color: var(--muted-foreground);
      font-family: 'Lato', sans-serif;
      transition: all 0.15s;
    }
    .filter-tab.active,
    .filter-tab:hover { background: var(--primary); color: var(--primary-foreground); border-color: var(--primary); }

    /* Photo lightbox overlay */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img  { max-width: 100%; max-height: 90vh; border-radius: 0.75rem; object-fit: contain; }
    .lightbox-close {
      position: fixed;
      top: 1rem; right: 1.25rem;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      z-index: 1000;
    }

    /* Empty state */
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted-foreground); }
    .empty-state p { font-size: 0.875rem; margin-top: 0.5rem; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: var(--foreground);
      color: var(--background);
      padding: 0.625rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      .reviews-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="admin-page">

    <!-- Header -->
    <div class="admin-header">
      <h1>⭐ Review Management</h1>
      <a href="admin.html" class="action-btn" style="text-decoration:none;">← Back to Hub</a>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="pending">Pending</button>
        <button class="filter-tab" data-filter="approved">Approved</button>
        <button class="filter-tab" data-filter="all">All</button>
      </div>
      <button class="btn" id="refresh-btn" style="margin-left:auto;font-size:0.8125rem;padding:0.375rem 1rem;">↻ Refresh</button>
    </div>

    <!-- Stats row -->
    <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;">
      <div class="booking-count" id="count-pending" style="background:var(--card);border:1px solid var(--border);border-radius:0.5rem;padding:0.5rem 1rem;font-size:0.8125rem;">Pending: —</div>
      <div class="booking-count" id="count-approved" style="background:var(--card);border:1px solid var(--border);border-radius:0.5rem;padding:0.5rem 1rem;font-size:0.8125rem;">Approved: —</div>
      <div class="booking-count" id="count-photos" style="background:var(--card);border:1px solid var(--border);border-radius:0.5rem;padding:0.5rem 1rem;font-size:0.8125rem;">With photos: —</div>
    </div>

    <!-- Cards grid -->
    <div class="reviews-grid" id="reviews-grid">
      <div class="empty-state"><p>Loading reviews…</p></div>
    </div>

    <div class="booking-count" id="reviews-count" style="margin-top:1rem;"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="Review photo">
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="admin-reviews.js"></script>
</body>
</html>
