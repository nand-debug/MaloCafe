<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline – Malo Cafe</title>
  <link rel="stylesheet" href="status.css">
</head>
<body>

<div class="status-shell">
  <div class="status-panel">
    <div class="status-content">

      <figure class="status-image-wrap">
        <img src="images/Notfound.gif" alt="Offline illustration" class="status-image" loading="lazy">
      </figure>

      <div class="status-copy">
        <span class="status-eyebrow">No Connection</span>
        <h1 class="status-title">You're offline</h1>
        <p class="status-text">
          Looks like you lost your internet connection.
          Check your Wi-Fi or mobile data, then we'll take you right back to Malo Cafe.
        </p>

        <div class="status-dots" id="status-dots">
          <div class="status-dot"></div>
          <div class="status-dot"></div>
          <div class="status-dot"></div>
        </div>
        <p class="status-meta" id="status-meta">Waiting for connection…</p>

        <div class="status-actions">
          <button class="status-button status-button-primary" onclick="retryNow()">Try again</button>
          <a href="/index.html" class="status-button status-button-primary">Go home</a>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  // Redirect back to home the moment connection returns
  window.addEventListener('online', function () {
    document.getElementById('status-meta').textContent = 'Connection restored! Redirecting…';
    setTimeout(function () {
      window.location.href = '/index.html';
    }, 800);
  });

  // Manual retry button
  function retryNow() {
    if (navigator.onLine) {
      window.location.href = '/index.html';
    } else {
      var meta = document.getElementById('status-meta');
      meta.textContent = 'Still offline. Please check your connection.';
      setTimeout(function () {
        meta.textContent = 'Waiting for connection…';
      }, 3000);
    }
  }

  // Scroll to top on load
  window.addEventListener('load', function () {
    window.scrollTo(0, 0);
  });
</script>

</body>
</html>
