<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – Malo Cafe</title>
  <link rel="stylesheet" href="status.css">
</head>
<body>

<div class="status-shell">
  <div class="status-panel">
    <div class="status-content">

      <figure class="status-image-wrap">
        <img src="images/Notfound.gif" alt="404 Not Found" class="status-image" loading="lazy">
      </figure>

      <div class="status-copy">
        <span class="status-eyebrow">404 Error</span>
        <h1 class="status-title">Page not found</h1>
        <p class="status-text">
          Sorry, the page you're looking for doesn't exist or may have moved.
          Head back home and we'll get you sorted.
        </p>

        <div class="status-actions">
          <a href="index.html" class="status-button status-button-primary">Go home</a>
          <a href="contact.html" class="status-button status-button-secondary">Contact us</a>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  window.addEventListener('load', function () {
    window.scrollTo(0, 0);
  });
</script>

</body>
</html>
