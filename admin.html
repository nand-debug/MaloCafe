
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Management - Malo Cafe</title>
  <meta name="description" content="Malo Cafe waiter/admin dashboard for managing bookings, assigning tables, and tracking status.">
  <link rel="stylesheet" href="style.css">
  <style>
    
  </style>
</head>
<body>
  <div class="admin-page">
    <!-- Header -->
    <div class="admin-header">
      <h1>📋 Booking Management</h1>
      <span class="demo-badge" id="demo-badge" style="display:none;">Demo Mode — configure endpoint to connect</span>
    </div>

    <!-- Toolbar: date filter + refresh -->
    <div class="toolbar">
    <label style="font-size:0.8125rem;font-weight:600;">Filter by date:</label>
    <input type="date" id="filter-date">
    <button class="action-btn" id="clear-filter" style="display:none;">Clear</button>
    <button class="action-btn save-btn" id="toggle-booking-btn">Pause Bookings</button>
    <button class="btn" id="refresh-btn" style="margin-left:auto;font-size:0.8125rem;padding:0.375rem 1rem;">↻ Refresh</button>
  </div>

    

    <!-- Bookings table -->
    <div class="booking-table-wrap">
      <table class="booking-table" id="bookings-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Guests</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
            <th>Table / Location</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="bookings-body">
          <!-- Rows injected by JS -->
        </tbody>
      </table>
    </div>
    <div class="booking-count" id="booking-count"></div>
  </div>

   <script src="admin-booking.js"></script>
</body>
</html>
