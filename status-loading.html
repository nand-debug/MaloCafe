<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website with Loading Screen</title>
  <link rel="stylesheet" href="status.css">

  </head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <img src="images/loading.gif" alt="Loading GIF" loading="lazy">
    <h1>Loading your website</h1>
    <p>Please wait a moment…</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script src="status.js"></script>

  </body>
</html>
