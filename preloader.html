<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MALOCAFE - Loading</title>
<style>
  :root{
    --cream:#f3ead8;
    --cream-2:#e9dcc0;
    --espresso:#1c100a;
    --coffee:#5b3a22;
    --caramel:#d4904a;
    --crema:#e6c089;
    --gold:#f0c270;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--espresso);color:var(--cream);
    font-family:"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}

  /* ============ PRELOADER ============ */
  .preloader{
    position:fixed;inset:0;z-index:9999;overflow:hidden;background:var(--cream);
    animation:plOut .9s cubic-bezier(.76,0,.24,1) 3.6s forwards;
  }

  /* layered backdrops */
  .bg-grain{position:absolute;inset:0;opacity:.18;mix-blend-mode:multiply;pointer-events:none;
    background-image:radial-gradient(rgba(28,16,10,.5) 1px,transparent 1px);background-size:3px 3px}
  .bg-rings{position:absolute;inset:-20%;border-radius:50%;
    background:
      radial-gradient(circle, transparent 28%, rgba(28,16,10,.06) 28.4%, transparent 29%),
      radial-gradient(circle, transparent 38%, rgba(28,16,10,.05) 38.4%, transparent 39%),
      radial-gradient(circle, transparent 50%, rgba(28,16,10,.04) 50.4%, transparent 51%);
    animation:spin 18s linear infinite}

  /* big motion words sliding behind */
  .marquee{position:absolute;left:0;right:0;display:flex;gap:60px;white-space:nowrap;
    font-weight:900;font-style:italic;font-size:18vw;letter-spacing:-.04em;color:var(--espresso);
    opacity:.06;pointer-events:none;text-transform:uppercase}
  .marquee.row1{top:8%;animation:slideL 14s linear infinite}
  .marquee.row2{bottom:6%;animation:slideR 16s linear infinite;font-style:normal}

  /* center stage */
  .stage{position:absolute;inset:0;display:grid;place-items:center}
  .scene{position:relative;width:min(560px,90vw);height:min(560px,90vw);display:grid;place-items:center}

  /* spinning accent ring */
  .ring{position:absolute;inset:0;border-radius:50%;border:1.5px dashed var(--espresso);
    opacity:.35;animation:spin 12s linear infinite}
  .ring.inner{inset:14%;border-style:solid;border-width:1px;animation-direction:reverse;animation-duration:18s;opacity:.25}
  .badge{position:absolute;top:6%;left:50%;transform:translateX(-50%);
    background:var(--espresso);color:var(--cream);font-size:10px;letter-spacing:.4em;padding:6px 12px;border-radius:999px;
    animation:popIn .5s .2s both}

  /* CUP */
  .cup{position:relative;width:200px;height:220px;animation:cupIn .6s cubic-bezier(.2,.9,.2,1) both}
  .cup-body{position:absolute;inset:0;width:170px;height:200px;margin:auto;left:0;right:0;
    background:#fff;border:4px solid var(--espresso);
    border-radius:18px 18px 80px 80px / 18px 18px 110px 110px;overflow:hidden;
    box-shadow:0 30px 50px -25px rgba(28,16,10,.5), inset 0 -20px 30px rgba(28,16,10,.06)}
  .cup-body::after{content:"";position:absolute;left:14px;top:14px;width:18px;height:60px;border-radius:50%;
    background:rgba(255,255,255,.7);transform:rotate(-12deg);filter:blur(2px)}
  .handle{position:absolute;right:-6px;top:54px;width:48px;height:74px;
    border:4px solid var(--espresso);border-left:none;border-radius:0 40px 40px 0}
  .saucer{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
    width:240px;height:18px;background:var(--espresso);border-radius:50%;
    box-shadow:0 16px 22px -10px rgba(28,16,10,.45)}

  /* liquid */
  .liquid{position:absolute;left:0;right:0;bottom:0;height:0;
    background:linear-gradient(180deg,var(--coffee) 0%,#3a2113 60%,var(--espresso) 100%);
    animation:fill 1.6s cubic-bezier(.65,.05,.36,1) .55s forwards}
  .liquid::before,.liquid::after{content:"";position:absolute;left:-15%;right:-15%;height:18px;border-radius:50%}
  .liquid::before{top:-9px;background:var(--crema);animation:wave 1.1s ease-in-out infinite}
  .liquid::after{top:-7px;background:var(--gold);opacity:.55;animation:wave 1.4s ease-in-out infinite reverse}

  /* pour stream from top */
  .pour{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:6px;height:0;
    background:linear-gradient(180deg,var(--coffee),var(--espresso));border-radius:6px;
    animation:pour .55s ease-in .15s forwards, pourOut .25s ease-in 1.55s forwards}
  /* splash droplets */
  .drop{position:absolute;width:10px;height:10px;background:var(--coffee);border-radius:50%;opacity:0}
  .drop.d1{top:10px;left:46%;animation:splash 1.4s ease-out .9s infinite}
  .drop.d2{top:10px;left:54%;animation:splash 1.4s ease-out 1.05s infinite}
  .drop.d3{top:10px;left:50%;animation:splash 1.4s ease-out 1.2s infinite}

  /* steam */
  .steam{position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:120px;height:80px;opacity:0;
    animation:steamFade .6s ease-out 1.9s forwards}
  .steam span{position:absolute;bottom:0;width:14px;height:14px;background:rgba(91,58,34,.4);
    border-radius:50%;filter:blur(5px);animation:rise 1.6s ease-in infinite}
  .steam span:nth-child(1){left:24px;animation-delay:0s}
  .steam span:nth-child(2){left:54px;animation-delay:.3s}
  .steam span:nth-child(3){left:84px;animation-delay:.6s}

  /* coffee beans flying in around the cup */
  .bean{position:absolute;width:22px;height:30px;background:var(--coffee);border-radius:50%;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.15)}
  .bean::after{content:"";position:absolute;inset:0;background:
    linear-gradient(180deg,transparent 48%,var(--espresso) 48%,var(--espresso) 52%,transparent 52%);
    border-radius:50%;transform:rotate(-12deg)}
  .bean.b1{top:18%;left:8%;animation:beanIn 1s cubic-bezier(.2,.8,.2,1) .2s both, float 4s ease-in-out 1.2s infinite}
  .bean.b2{top:22%;right:6%;animation:beanIn 1s cubic-bezier(.2,.8,.2,1) .35s both, float 4.4s ease-in-out 1.4s infinite reverse}
  .bean.b3{bottom:24%;left:12%;animation:beanIn 1s cubic-bezier(.2,.8,.2,1) .5s both, float 4.8s ease-in-out 1.6s infinite}
  .bean.b4{bottom:18%;right:10%;animation:beanIn 1s cubic-bezier(.2,.8,.2,1) .65s both, float 4.2s ease-in-out 1.8s infinite reverse}
  .bean.b5{top:50%;left:0%;animation:beanIn 1s cubic-bezier(.2,.8,.2,1) .8s both, float 5s ease-in-out 2s infinite}
  .bean.b6{top:50%;right:0%;animation:beanIn 1s cubic-bezier(.2,.8,.2,1) .95s both, float 5.2s ease-in-out 2.2s infinite reverse}

  /* kinetic typography */
  .word-wrap{position:absolute;left:0;right:0;top:calc(50% + 170px);text-align:center;perspective:800px}
  .word{display:inline-flex;gap:4px;font-weight:900;letter-spacing:.18em;font-size:42px;color:var(--espresso);
    text-transform:uppercase}
  .word span{display:inline-block;opacity:0;transform:translateY(40px) rotateX(-90deg);transform-origin:50% 100%;
    animation:letter .55s cubic-bezier(.2,.8,.2,1) forwards}
  .word span:nth-child(1){animation-delay:1.2s}
  .word span:nth-child(2){animation-delay:1.27s}
  .word span:nth-child(3){animation-delay:1.34s}
  .word span:nth-child(4){animation-delay:1.41s}
  .word span:nth-child(5){animation-delay:1.48s}
  .word span:nth-child(6){animation-delay:1.55s}
  .word span:nth-child(7){animation-delay:1.62s}
  .word span:nth-child(8){animation-delay:1.69s}
  .tag{margin-top:14px;font-size:11px;letter-spacing:.55em;color:var(--coffee);opacity:0;
    animation:fadeUp .6s ease-out 2s forwards}

  /* progress bar */
  .progress-wrap{position:fixed;left:50%;bottom:48px;transform:translateX(-50%);
    width:min(360px,80vw);display:flex;align-items:center;gap:12px;color:var(--espresso);font-size:11px;letter-spacing:.3em;
    opacity:0;animation:fadeUp .5s ease-out .4s forwards;z-index:100}
  .bar{flex:1;height:2px;background:rgba(28,16,10,.15);border-radius:2px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:var(--espresso);
    animation:barFill 3.2s cubic-bezier(.65,.05,.36,1) .2s forwards}
  .pct{min-width:42px;text-align:right;font-variant-numeric:tabular-nums}

  /* mobile & tablet responsive */
  @media (max-width:768px){
    .progress-wrap{width:min(300px,85vw);font-size:10px;bottom:40px}
    .bar{height:1.5px}
    .word{font-size:clamp(28px,8vw,42px)}
    .scene{width:min(400px,90vw);height:min(400px,90vw)}
    .cup{width:150px;height:170px}
    .cup-body{width:130px;height:155px}
  }

  @media (max-width:480px){
    .progress-wrap{width:min(260px,90vw);font-size:9px;gap:8px;bottom:35px}
    .bar{height:1px}
    .word{font-size:clamp(24px,6vw,36px);letter-spacing:.12em}
    .scene{width:min(300px,95vw);height:min(300px,95vw)}
    .cup{width:130px;height:150px}
    .cup-body{width:110px;height:135px}
    .handle{width:40px;height:60px;right:-4px;top:45px}
    .saucer{width:200px;height:15px}
    .badge{font-size:8px;padding:4px 8px}
    .tag{font-size:9px;letter-spacing:.4em}
    .marquee{font-size:12vw}
  }

  /* ============ KEYFRAMES ============ */
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes slideL{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes slideR{from{transform:translateX(-50%)}to{transform:translateX(0)}}
  @keyframes cupIn{from{transform:translateY(40px) scale(.9);opacity:0}to{transform:none;opacity:1}}
  @keyframes popIn{from{transform:translateX(-50%) scale(0);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
  @keyframes fill{to{height:78%}}
  @keyframes wave{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes pour{to{height:90px}}
  @keyframes pourOut{to{opacity:0;transform:translateX(-50%) scaleY(.4)}}
  @keyframes splash{0%{opacity:0;transform:translate(0,0) scale(.6)}
    20%{opacity:1}
    100%{opacity:0;transform:translate(var(--tx,20px),-30px) scale(.4)}}
  .drop.d1{--tx:-22px}.drop.d2{--tx:24px}.drop.d3{--tx:0px}
  @keyframes rise{0%{transform:translateY(0) scale(.7);opacity:.6}100%{transform:translateY(-70px) scale(1.6);opacity:0}}
  @keyframes steamFade{to{opacity:1}}
  @keyframes beanIn{from{opacity:0;transform:translate(var(--tx,80px),var(--ty,-60px)) rotate(-180deg) scale(.4)}
    to{opacity:1;transform:translate(0,0) rotate(20deg) scale(1)}}
  .bean.b1{--tx:-80px;--ty:-80px}.bean.b2{--tx:80px;--ty:-80px}
  .bean.b3{--tx:-60px;--ty:80px}.bean.b4{--tx:60px;--ty:80px}
  .bean.b5{--tx:-100px;--ty:0}.bean.b6{--tx:100px;--ty:0}
  @keyframes float{0%,100%{transform:translateY(0) rotate(20deg)}50%{transform:translateY(-8px) rotate(28deg)}}
  @keyframes letter{to{opacity:1;transform:none}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes barFill{to{width:100%}}
  @keyframes plOut{to{opacity:0;visibility:hidden}}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.01ms!important;animation-delay:0ms!important}
  }
</style>
</head>
<body>

  <!-- ============ PRELOADER ============ -->
  <div class="preloader" id="preloader" aria-hidden="true">
    <div class="bg-grain"></div>
    <div class="bg-rings"></div>

    <div class="marquee row1">
      <span>ESPRESSO · LATTE · MOCHA · ESPRESSO · LATTE · MOCHA ·</span>
      <span>ESPRESSO · LATTE · MOCHA · ESPRESSO · LATTE · MOCHA ·</span>
    </div>
    <div class="marquee row2">
      <span>FRESH ROAST · SLOW BREW · FRESH ROAST · SLOW BREW ·</span>
      <span>FRESH ROAST · SLOW BREW · FRESH ROAST · SLOW BREW ·</span>
    </div>

    <div class="stage">
      <div class="scene">
        <div class="ring"></div>
        <div class="ring inner"></div>
        <div class="badge">SINCE 2024</div>

        <div class="bean b1"></div><div class="bean b2"></div>
        <div class="bean b3"></div><div class="bean b4"></div>
        <div class="bean b5"></div><div class="bean b6"></div>

        <div class="cup">
          <div class="steam"><span></span><span></span><span></span></div>
          <div class="cup-body">
            <div class="pour"></div>
            <div class="liquid">
              <div class="drop d1"></div>
              <div class="drop d2"></div>
              <div class="drop d3"></div>
            </div>
          </div>
          <div class="handle"></div>
          <div class="saucer"></div>
        </div>
      </div>
    </div>

    <div class="word-wrap">
      <div class="word" aria-label="MALOCAFE">
        <span>M</span><span>A</span><span>L</span><span>O</span>
        <span>C</span><span>A</span><span>F</span><span>E</span>
      </div>
      <div class="tag">CRAFTED · ROASTED · SERVED</div>
    </div>

    <div class="progress-wrap">
      <span>LOADING</span>
      <div class="bar"><i></i></div>
      <span class="pct" id="pct">0%</span>
    </div>
  </div>

<script>
const pct = document.getElementById('pct');
const start = performance.now();
const dur = 3200;

function tick(now){
  const t = Math.min(1,(now-start)/dur);
  pct.textContent = Math.round(t*100)+'%';
  if(t<1) requestAnimationFrame(tick);
}

requestAnimationFrame(tick);

/* go to homepage */
setTimeout(()=>{
  window.location.href = "index.html";
},4600);
</script>
</body>
</html>
